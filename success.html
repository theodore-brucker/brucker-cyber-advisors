<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--blue:#215F9A;--blue-dark:#183f66;--black:#000;--white:#fff;--gray-200:#e0e2e6;--gray-600:#555a63;--gray-800:#2a2d33;--serif:'Cormorant Garamond',Georgia,serif;--sans:'Source Sans 3','Segoe UI',sans-serif}
html{font-size:16px}

img{max-width:100%;display:block}
a{color:var(--blue);text-decoration:none}
nav{background:var(--white);border-bottom:1px solid var(--gray-200);height:72px;display:flex;align-items:center}

.success-wrap h1{font-family:var(--serif);font-weight:700;font-size:2.4rem;margin-bottom:16px;color:var(--black)}
.success-wrap p{font-size:1.1rem;color:var(--gray-600);margin-bottom:32px;max-width:520px;margin-left:auto;margin-right:auto}
.btn{display:inline-block;font-family:var(--sans);font-weight:600;font-size:.95rem;padding:14px 32px;border-radius:4px;cursor:pointer;border:none;background:var(--blue);color:var(--white);transition:background .25s}
.btn:hover{background:var(--blue-dark)}
</style>
